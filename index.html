<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hand Skeleton Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    #container { position: relative; width: 100vw; height: 100vh; }
    video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: rotateY(180deg); opacity: 0.3; /* 카메라 투명도 조절 */ }
    canvas { position: absolute; width: 100%; height: 100%; transform: rotateY(180deg); z-index: 10; }
    #ui { position: absolute; top: 20px; left: 20px; z-index: 100; color: #00ff00; background: rgba(0,0,0,0.7); padding: 10px; border-left: 4px solid #00ff00; }
  </style>
</head>
<body>

  <div id="ui">
    <div style="font-weight: bold; font-size: 18px;">SKELETON ANALYZER</div>
    <div id="status" style="font-size: 14px;">Initializing...</div>
  </div>

  <div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <script type="module">
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status');

    function onResults(results) {
      // 캔버스 초기화
      canvasElement.width = window.innerWidth;
      canvasElement.height = window.innerHeight;
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        statusText.innerText = "HAND DETECTED";
        for (const landmarks of results.multiHandLandmarks) {
          // 뼈대 연결선 그리기 (밝은 형광 연두색)
          drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
            color: '#00FF00',
            lineWidth: 5
          });
          // 마디 지점(랜드마크) 그리기 (흰색 원)
          drawLandmarks(canvasCtx, landmarks, {
            color: '#FFFFFF',
            lineWidth: 2,
            radius: 4
          });
        }
      } else {
        statusText.innerText = "SEARCHING FOR HAND...";
      }
      canvasCtx.restore();
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,         // 두 손 모두 분석
      modelComplexity: 1,      // 정밀 모드
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
      },
      width: 1280,
      height: 720
    });
    camera.start();
  </script>
</body>
</html>
